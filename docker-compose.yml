# Complete Docker Compose for Medical RAG Assistant
# Includes: Qdrant (Vector DB), Chainlit (UI), and API Server

version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: medical-qdrant
    ports:
      - "6333:6333"
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY:-change-me-secret-key}
      QDRANT_MAX_BATCH_SIZE: 100
      QDRANT_TELEMETRY_ENABLED: "false"
      QDRANT_SNAPSHOTS_ENABLED: "true"
    volumes:
      - qdrant_data:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - medical_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  qdrant_data:
    driver: local
  qdrant_snapshots:
    driver: local
  model_cache:
    driver: local

networks:
  medical_network:
    driver: bridge
